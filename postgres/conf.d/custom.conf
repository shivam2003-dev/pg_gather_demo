# =============================================================================
# pg_gather Learning Lab — Custom PostgreSQL 16 Configuration
# Loaded via: -c include_dir=/etc/postgresql/conf.d
# =============================================================================

# ── Extensions to load at startup ────────────────────────────────────────────
# pg_stat_statements: tracks execution count, total/mean/min/max time,
#   rows, cache hits for every distinct query. pg_gather's "Top SQL" section
#   reads directly from pg_stat_statements view — without this, that section
#   is completely empty.
shared_preload_libraries = 'pg_stat_statements'

# ── pg_stat_statements tuning ────────────────────────────────────────────────
# How many distinct query fingerprints to keep in memory.
# 5000 is enough for a lab; production commonly uses 10000.
pg_stat_statements.max = 5000

# 'all' = track queries from all users (not just superusers).
# pg_gather runs as a superuser so 'top' would also work, but 'all' gives
# the full picture needed for the "Top SQL by Total Time" section.
pg_stat_statements.track = all

# ── Memory ────────────────────────────────────────────────────────────────────
# shared_buffers: portion of RAM Postgres uses for its own buffer cache.
# Rule of thumb: 25% of available RAM. 256 MB is conservative for a laptop.
# pg_gather's "Cache Hit Ratio" section shows how well this is sized.
shared_buffers = 256MB

# work_mem: per-sort / per-hash memory. Set too low → spills to disk (visible
# in pg_gather's "Sort / Hash Spills" section). Set too high → OOM under
# concurrent load. 8 MB is a safe lab default.
work_mem = 8MB

# maintenance_work_mem: memory for VACUUM, CREATE INDEX, etc.
# pg_gather's "Autovacuum" section highlights tables that vacuum cannot keep
# up with; increasing this often helps.
maintenance_work_mem = 64MB

# effective_cache_size: tells the planner how much OS + PG cache is available.
# NOT allocated — purely advisory. Affects index-vs-seqscan decisions.
# Set to ~50-75% of total RAM. Wrong value = suboptimal query plans.
effective_cache_size = 512MB

# ── Connections ───────────────────────────────────────────────────────────────
# max_connections: hard ceiling. Every connection uses ~5–10 MB of shared mem.
# pg_gather's "Connection Slots" section shows free vs. used slots — a common
# production emergency is running out of connections.
max_connections = 100

# ── Logging — crucial for pg_gather diagnostics ──────────────────────────────
# Log destination: use stderr (captured by Docker's log driver).
log_destination = 'stderr'
logging_collector = off          # Docker captures stderr; no separate files

# log_min_duration_statement: log any query that takes ≥ this many ms.
# 1000 ms = 1 second. Set to 0 to log ALL queries (very verbose).
# pg_gather does NOT read pg_log directly, but this lets you cross-reference
# the HTML report findings against actual log lines.
log_min_duration_statement = 1000

# Log lock waits longer than deadlock_timeout (default 1 s).
# pg_gather's "Lock Waits" section becomes more meaningful with this on.
log_lock_waits = on

# Log auto-explain for slow plans (requires log_min_duration_statement > 0).
log_checkpoints = on             # visible in pg_gather "Checkpoint" section
log_connections = off            # too noisy for a lab
log_disconnections = off

# ── Autovacuum ────────────────────────────────────────────────────────────────
# autovacuum: must stay on. We deliberately disable it PER TABLE in the
# seed SQL (labs/lab3_bloat) to demonstrate bloat — never disable globally.
autovacuum = on

# autovacuum_vacuum_scale_factor: trigger vacuum when dead tuples exceed
# this fraction of the table. 0.02 = 2% (default). Lower = more frequent
# vacuum = less bloat. pg_gather's "Bloat" and "Autovacuum" sections show
# tables that are overdue.
autovacuum_vacuum_scale_factor = 0.02

# Cost delay controls how much autovacuum "sleeps" between pages.
# Low delay = faster vacuum but more I/O impact.
autovacuum_vacuum_cost_delay = 2ms

# ── Checkpoints ───────────────────────────────────────────────────────────────
# checkpoint_completion_target: spread WAL writes over this fraction of the
# checkpoint interval. 0.9 = write steadily over 90% of the interval,
# avoiding I/O spikes. pg_gather "Checkpoint" section shows checkpoint
# frequency and write amplification.
checkpoint_completion_target = 0.9

# min_wal_size / max_wal_size: WAL retention bounds.
min_wal_size = 80MB
max_wal_size = 1GB

# ── Statistics ────────────────────────────────────────────────────────────────
# track_io_timing: enables I/O timing in pg_stat_statements and EXPLAIN.
# Adds tiny overhead but gives pg_gather "I/O Time" columns real data.
track_io_timing = on

# track_counts: required for autovacuum and pg_gather dead-tuple metrics.
track_counts = on

# default_statistics_target: number of histogram buckets for ANALYZE.
# Higher = better estimates = better plans, but slower ANALYZE.
default_statistics_target = 100
