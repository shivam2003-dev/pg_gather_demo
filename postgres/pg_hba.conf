# =============================================================================
# pg_gather Learning Lab — pg_hba.conf
# Controls: who can connect, from where, and with what auth method.
# Format: TYPE  DATABASE  USER  ADDRESS  METHOD
# =============================================================================

# ── Local socket connections (inside the container) ──────────────────────────
# Used by pg_isready health check and docker exec psql sessions.
local   all             all                                     trust

# ── Loopback (127.0.0.1 and ::1) ─────────────────────────────────────────────
# psql from localhost on the host machine uses the mapped port and lands here.
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             ::1/128                 scram-sha-256

# ── Docker bridge network (172.16.0.0/12 covers all default Docker subnets) ──
# Services in the same docker-compose network reach Postgres via this range.
# pg_gather runner container will connect through this path.
host    all             all             172.16.0.0/12           scram-sha-256

# ── Docker Compose default network (192.168.0.0/16) ──────────────────────────
# Some Docker installations assign addresses in this range.
host    all             all             192.168.0.0/16          scram-sha-256

# Replication connections (needed for lab5 streaming replication)
host    replication     all             172.16.0.0/12           scram-sha-256
